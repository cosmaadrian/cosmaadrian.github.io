- name: The Strawberry Problem
  repo: cosmaadrian/strawberry-problem
  focus: Language models, tokenization
  summary: Official codebase for work on character-level understanding and tokenized language models.

- name: PsyMo
  repo: cosmaadrian/psymo
  focus: Datasets, gait, psychology
  summary: Dataset release for estimating self-reported psychological traits from gait.

- name: GaitFormer
  repo: cosmaadrian/gaitformer
  focus: Representation learning
  summary: Research code for learning gait representations with noisy multi-task learning.

- name: RoMath
  repo: cosmaadrian/romath
  focus: Multilingual reasoning
  summary: Romanian mathematical reasoning benchmark for evaluating and improving non-English language models.

- name: Depression Detection from Video
  repo: cosmaadrian/multimodal-depression-from-video
  focus: Multimodal learning
  summary: Non-verbal cue modeling for depression detection in video using multimodal signals.

- name: Time-Enriched Multimodal Transformers
  repo: cosmaadrian/time-enriched-multimodal-depression-detection
  focus: Temporal modeling
  summary: Follow-up work on temporal structure for multimodal depression detection.
