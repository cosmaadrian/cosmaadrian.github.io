<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}
  </head>
  <body class="{{ page.body_class | default: 'page-body' }}">
    <div class="ambient-glow ambient-glow-left"></div>
    <div class="ambient-glow ambient-glow-right"></div>
    <div class="site-shell">
      <header class="site-header">
        <a class="site-mark" href="{{ '/' | relative_url }}">
          <span class="site-mark-name">Adrian Cosma</span>
          <span class="site-mark-role">AI research</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
          <a href="{{ '/publications/' | relative_url }}" {% if page.url == '/publications/' %}aria-current="page"{% endif %}>Publications</a>
          <a href="{{ '/projects/' | relative_url }}" {% if page.url == '/projects/' %}aria-current="page"{% endif %}>Projects</a>
          <a href="{{ '/cv/' | relative_url }}" {% if page.url == '/cv/' %}aria-current="page"{% endif %}>CV</a>
          <a href="{{ '/writing/' | relative_url }}" {% if page.url == '/writing/' %}aria-current="page"{% endif %}>Writing</a>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div>
          <p class="footer-title">TODO.</p>
          <p class="footer-copy">
            TODO.
          </p>
        </div>
        <div class="footer-links">
          <a href="mailto:{{ site.author.email }}">Email</a>
          <a href="https://scholar.google.com/citations?user=cdYk_RUAAAAJ&hl=en">Scholar</a>
          <a href="https://github.com/cosmaadrian">GitHub</a>
          <a href="https://www.linkedin.com/in/cosmadrian/">LinkedIn</a>
        </div>
      </footer>
    </div>

    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
