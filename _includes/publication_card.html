<article class="publication-card{% if include.compact %} publication-card-compact{% endif %}">
  <div class="publication-headerline">
    <span class="publication-year">{{ include.publication.year }}</span>
    <span class="publication-type">{{ include.publication.type }}</span>
  </div>
  <h3>{{ include.publication.title }}</h3>
  <p class="publication-authors">{{ include.publication.authors }}</p>
  <p class="publication-venue">{{ include.publication.venue }}</p>
  <div class="publication-links">
    <a class="text-link" href="https://scholar.google.com/scholar?q={{ include.publication.title | uri_escape }}">Scholar</a>
    {% if include.publication.github_repo %}
      <a class="metric-pill metric-link" href="https://github.com/{{ include.publication.github_repo }}" data-github-repo="{{ include.publication.github_repo }}">
        Code
      </a>
    {% endif %}
    <span class="metric-pill" data-citation-title="{{ include.publication.title | escape }}" data-citation-year="{{ include.publication.year }}">
      Citations loading
    </span>
  </div>
</article>
